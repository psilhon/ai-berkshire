<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 336" font-family="'PingFang SC','Hiragino Sans GB','Microsoft YaHei','Noto Sans CJK SC','Source Han Sans SC',sans-serif">
  <defs>
