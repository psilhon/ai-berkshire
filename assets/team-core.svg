  <line x1="400" y1="56" x2="400" y2="76" stroke="#52514e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="412" y="72" font-size="11.5" fill="#8a897f">×4 并行</text>

  <g>
